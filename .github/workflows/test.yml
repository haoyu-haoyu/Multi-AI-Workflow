name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-maw:
    name: MAW CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd maw && npm install
      - run: cd maw && npm run build
      - run: cd maw && npm test

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd maw && npm install
      - run: cd maw && npx tsc --noEmit

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd dashboard && npm install
      - run: cd dashboard && npm run build

  bridges:
    name: Python Bridges
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: cd bridges && pip install -e ".[dev]"
      - name: Run bridge tests
        run: |
          cd bridges
          if [ -d tests ] && [ "$(find tests -name 'test_*.py' | head -1)" ]; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No bridge tests found yet — skipping"
          fi
